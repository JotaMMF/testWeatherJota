<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Clima Desktop</title>
    <link rel="icon" type="image/png" sizes="16x16" href="icon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="icon/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="256x256" href="icon/favicon-256x256.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#008080">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/7.css">
    <link rel="stylesheet" href="styles/weatherstyle.css">
</head>

<body>

    <!--
        🌦 ROOT NOTE:
        JS will dynamically apply:
        theme-sunny / theme-rain / theme-cloud / theme-storm
        to ALL .window elements below
    -->

    <div class="desktop">

        <!-- =====================================================
             🏷 TOP WINDOW (WELCOME HEADER)
        ===================================================== -->
        <div class="cell h win7 wide">

            <div class="window glass active top-window theme-cloud">

                <div class="title-bar">
                    <div class="title-bar-text">
                        Mike's Weather Page!!
                    </div>

                    <div class="title-bar-controls">
                        <button aria-label="Minimize"></button>
                        <button aria-label="Maximize"></button>
                        <button aria-label="Close"></button>
                    </div>
                </div>

                <div class="window-body top">
                    <h1>WELCOME TO THE WEATHER PAGE!!!</h1>
                </div>

            </div>
        </div>


        <!-- =====================================================
             🔎 SEARCH WINDOW
        ===================================================== -->
        <div class="window active search theme-cloud">

            <div class="title-bar">
                <div class="title-bar-text">Buscar ubicación</div>
            </div>

            <div class="window-body">
                <div class="row">
                    <input id="cityInput" type="text" placeholder="Ej: Amsterdam, Madrid, Paris">
                    <button id="searchBtn">Buscar</button>
                </div>
            </div>

        </div>


        <!-- =====================================================
             🎯 CENTER GROUP
        ===================================================== -->
        <div class="center-group">

            <!-- 🌡 CURRENT WEATHER -->
            <div class="window active padded current theme-cloud">

                <div class="title-bar">
                    <div class="title-bar-text">Clima actual</div>
                </div>

                <div class="window-body" id="current"></div>

            </div>


            <!-- 📊 DETAILS -->
            <div class="window active padded details theme-cloud">

                <div class="title-bar">
                    <div class="title-bar-text">Detalles</div>
                </div>

                <div class="window-body" id="details"></div>

            </div>

        </div>


        <!-- =====================================================
             📅 FORECAST
        ===================================================== -->
        <div class="window active wide forecast theme-cloud">

            <div class="title-bar">
                <div class="title-bar-text">Pronóstico</div>
            </div>

            <div class="window-body" id="forecast"></div>

        </div>

    </div>

    <script src="scripts/weatherscript.js"></script>

</body>

</html>
